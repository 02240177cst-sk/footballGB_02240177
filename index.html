<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CST Football Ground Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    /*  Just try with the help of AI */
    body{
            background-image: url("cstlogo.png");
            background-repeat: no-repeat;
            background-position: center;
            background-size: 350px;
            background-attachment: fixed;
            background-color: #f8f9fa;
        }
</style>
<body>

    <header>
        <div class="container">
            <h1>CST Football Ground Booking</h1>
            <p>Automated Digital Scheduling Platform</p>
        </div>
    </header>

    <main class="container">
        
        <section id="booking-section">
            <h2>Register / Booking</h2>
            <form id="booking-form" novalidate>

                <div class="form-group">
                    <label for="user-name">Full Name:</label>
                    <input type="text" id="user-name" placeholder="Enter your name" required>
                    <span class="error" id="name-error"></span>
                </div>

                <div class="grid-inputs">
                    <div class="form-group">
                        <label for="user-category">User Type:</label>
                        <select id="user-category">
                            <option value="In Campus">In Campus (Student/Staff)</option>
                            <option value="Outsider">Outsider</option>
                        </select>
                    </div>

                    

                    <div class="form-group">
                        <label id="contact-label" for="user-contact">Student Number:</label>
                        <input type="text" id="user-contact" placeholder="e.g., 02XXXXXX" required>
                        <span class="error" id="contact-error"></span>
                    </div>
                </div>

                <!-- <div class="form-group">
                    <label for="user-phone">Phone Number:</label>
                    <input type="text" id="user-phone" placeholder="e.g., 17XXXXXX" required>
                    <span class="error" id="phone-error"></span>
                </div> -->

                <div class="form-group">
                    <label for="booking-date">Date:</label>
                    <input type="date" id="booking-date" required>
                    <span class="error" id="date-error"></span>
                </div>

                <div class="form-group">
                    <label for="time-slot">Time Slot:</label>
                    <select id="time-slot">
                        <option value="06:00 - 08:00">Early Morning (06:00 - 08:00)</option>
                        <option value="16:00 - 18:00">Evening Session 1 (16:00 - 18:00)</option>
                        <option value="18:00 - 20:00">Evening Session 2 (18:00 - 20:00)</option>
                    </select>
                </div>

                
                <button type="submit" id="book-btn">Confirm Booking</button>
            </form>
        </section>

        <hr>

        
        <section id="records-section">
            <h2>Active Bookings & Maintenance</h2>
            <div id="booking-list" class="grid-container">
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
